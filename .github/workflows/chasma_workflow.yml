name: Chasma Build And Test Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- Frontend Job ---
  build-frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: chasma-thin-client/package-lock.json

      - name: Install & Build Frontend
        run: |
          npm ci
          CI=false npm run build
        working-directory: chasma-thin-client

  # --- Backend Job (Runs once, in parallel with Frontend) ---
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore & Build API
        run: |
          dotnet restore ./ChasmaWebApi/ChasmaWebApi.sln
          dotnet build ./ChasmaWebApi/ChasmaWebApi.sln --no-restore
          
      - name: Test Web API
        run: dotnet test ./ChasmaWebApi/ChasmaWebApi.sln --no-build --verbosity normal